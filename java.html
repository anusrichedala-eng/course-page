<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    <div class="card shadow-lg border-0 rounded-4 p-4">
    <h2 class="text-primary fw-bold mb-4">Quick Quiz</h2>

    <p class="fs-4">Which keyword is used to inherit a class in Java?</p>

    <label class="form-control mb-3 p-3">
        <input type="radio" name="answer" value="Google">
        extends
    </label>

    <label class="form-control mb-3 p-3">
        <input type="radio" name="answer" value="Facebook">
        implements
    </label>

    <label class="form-control mb-3 p-3">
        <input type="radio" name="answer" value="Microsoft">
        super
    </label>

    <button class="btn btn-primary px-4" onclick="checkAnswer()">
        Submit
    </button>

    <div id="result" class="mt-4"></div>
</div>
body{
    background-color:#eef2f7;
}

.quiz-card{
    margin-top:50px;
    border:none;
    border-radius:20px;
}

.option-box{
    border:1px solid #dcdcdc;
    border-radius:10px;
    padding:15px;
    margin-bottom:12px;
    transition:0.3s;
}

.option-box:hover{
    background:#f8f9fa;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

#result{
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

    <div class="card shadow-lg quiz-card">
        <div class="card-body p-4">

            <h2 class="text-primary fw-bold mb-4">Java Quiz</h2>

            <form id="quizForm">

                <!-- Question 1 -->
                <div class="mb-4">
                    <h5>1. Which keyword is used to inherit a class in Java?</h5>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q1" value="a">
                        <label class="form-check-label">extends</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q1" value="b">
                        <label class="form-check-label">implements</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q1" value="c">
                        <label class="form-check-label">super</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q1" value="d">
                        <label class="form-check-label">this</label>
                    </div>
                </div>

                <!-- Question 2 -->
                <div class="mb-4">
                    <h5>2. Which method is the entry point of a Java program?</h5>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q2" value="a">
                        <label class="form-check-label">main()</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q2" value="b">
                        <label class="form-check-label">run()</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q2" value="c">
                        <label class="form-check-label">start()</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q2" value="d">
                        <label class="form-check-label">init()</label>
                    </div>
                </div>

                <!-- Question 3 -->
                <div class="mb-4">
                    <h5>3. Which collection stores unique elements?</h5>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q3" value="a">
                        <label class="form-check-label">ArrayList</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q3" value="b">
                        <label class="form-check-label">HashSet</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q3" value="c">
                        <label class="form-check-label">Vector</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q3" value="d">
                        <label class="form-check-label">LinkedList</label>
                    </div>
                </div>

                <!-- Question 4 -->
                <div class="mb-4">
                    <h5>4. Java is a ______ language.</h5>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q4" value="a">
                        <label class="form-check-label">Machine Language</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q4" value="b">
                        <label class="form-check-label">Object-Oriented</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q4" value="c">
                        <label class="form-check-label">Assembly Language</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q4" value="d">
                        <label class="form-check-label">Markup Language</label>
                    </div>
                </div>

                <!-- Question 5 -->
                <div class="mb-4">
                    <h5>5. React JS is primarily used for?</h5>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q5" value="a">
                        <label class="form-check-label">Database Management</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q5" value="b">
                        <label class="form-check-label">Frontend UI Development</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q5" value="c">
                        <label class="form-check-label">Networking</label>
                    </div>

                    <div class="form-check option-box">
                        <input class="form-check-input" type="radio" name="q5" value="d">
                        <label class="form-check-label">Operating Systems</label>
                    </div>
                </div>

                <button type="button" class="btn btn-primary px-4" onclick="checkAnswers()">
                    Submit Quiz
                </button>

            </form>

            <div id="result"></div>
            <div id="review"></div>

        </div>
    </div>

</div>

<script>

function checkAnswers(){

const answers = {
q1:"a",
q2:"a",
q3:"b",
q4:"b",
q5:"b"
};

const correctText = {
q1:"extends",
q2:"main()",
q3:"HashSet",
q4:"Object-Oriented",
q5:"Frontend UI Development"
};

let score = 0;
let review = "<h3 class='mt-4'>Answer Review</h3>";

for(let q in answers){

let selected = document.querySelector(`input[name="${q}"]:checked`);

if(!selected){
alert("Please answer all questions.");
return;
}

if(selected.value === answers[q]){
score++;

review += `
<div class="alert alert-success">
✔ ${q.toUpperCase()} Correct
</div>`;
}
else{

review += `
<div class="alert alert-danger">
✘ ${q.toUpperCase()} Wrong<br>
Correct Answer: <strong>${correctText[q]}</strong>
</div>`;
}
}

let percentage = (score/5)*100;

document.getElementById("result").innerHTML = `
<div class="alert alert-info mt-4">
<h4>Your Score: ${score}/5</h4>
<h5>Percentage: ${percentage}%</h5>
</div>
`;

document.getElementById("review").innerHTML = review;

}

</script>

</body>
</html>
